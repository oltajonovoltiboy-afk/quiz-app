<!doctype html>
<html lang="uz">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>JavaScript Quiz App</title>
        <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
        <link rel="stylesheet" href="style.css" />
    </head>
    <body
        class="bg-gray-100 min-h-screen flex flex-col items-center justify-center p-4 font-sans text-gray-800"
    >
        <div
            id="start-screen"
            class="bg-white p-8 rounded-xl shadow-md max-w-md w-full text-center"
        >
            <h1 class="text-3xl font-bold text-indigo-600 mb-4">JS/Web Quiz</h1>
            <p class="text-gray-600 mb-6">
                O'z bilimingizni sinab ko'ring! Quiz
                <strong>3 ta savoldan</strong> iborat. Har bir savol uchun
                <strong>1 daqiqa (60s)</strong> vaqt beriladi. Vaqt tugab qolsa,
                balingizdan 1 ochko olib tashlanadi!
            </p>
            <button
                id="start-btn"
                class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-3 px-6 rounded-lg transition-colors duration-200 cursor-pointer"
            >
                Quizni Boshlash
            </button>
        </div>

        <div
            id="quiz-screen"
            class="bg-white p-8 rounded-xl shadow-md max-w-xl w-full hidden"
        >
            <div class="flex justify-between items-center mb-6">
                <span
                    id="question-counter"
                    class="text-sm font-medium text-gray-500 bg-gray-200 px-3 py-1 rounded-full"
                >
                    Savol: 1/3
                </span>
                <span
                    id="timer"
                    class="text-sm font-bold px-3 py-1 rounded-full bg-amber-100 text-amber-700"
                >
                    ⏳ 60s qoldi
                </span>
            </div>

            <h2 id="question-text" class="text-xl font-semibold mb-6">
                Savol matni...
            </h2>

            <div id="options-container" class="space-y-3"></div>

            <div
                id="next-container"
                class="mt-6 pt-4 border-t border-gray-100 flex flex-col sm:flex-row justify-between items-center gap-4 hidden"
            >
                <p id="feedback-text" class="text-sm font-medium"></p>
                <button
                    id="next-btn"
                    class="w-full sm:w-auto bg-gray-800 hover:bg-gray-900 text-white px-6 py-2 rounded-lg font-medium transition-colors cursor-pointer"
                >
                    Keyingi savol →
                </button>
            </div>
        </div>

        <div
            id="end-screen"
            class="bg-white p-8 rounded-xl shadow-md max-w-2xl w-full hidden"
        >
            <div class="text-center mb-8">
                <h2 class="text-3xl font-bold text-gray-900">
                    Quiz Yakunlandi!
                </h2>
                <p class="text-lg mt-2">
                    Sizning yakuniy balingiz:
                    <span
                        id="final-score"
                        class="font-bold text-indigo-600 text-2xl"
                        >0</span
                    >
                </p>
            </div>

            <h3 class="text-lg font-semibold mb-4 border-b pb-2">
                Natijalar tahlili
            </h3>
            <div
                id="summary-container"
                class="space-y-4 max-h-96 overflow-y-auto pr-2 mb-6"
            ></div>

            <button
                id="restart-btn"
                class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-3 rounded-lg transition-colors cursor-pointer"
            >
                Qayta urinish
            </button>
        </div>

        <script src="app.js"></script>
    </body>
</html>
